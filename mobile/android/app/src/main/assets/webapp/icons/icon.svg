<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#00B894"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Medical cross -->
  <rect x="196" y="96" width="120" height="320" rx="24" fill="url(#cross)"/>
  <rect x="96" y="196" width="320" height="120" rx="24" fill="url(#cross)"/>
  <!-- Heartbeat line -->
  <polyline points="80,340 160,340 200,280 240,400 280,300 320,360 360,340 440,340" 
    fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
