# ============================================
# CMC Health - Docker Compose
# ============================================
# Usage:
#   Development : docker compose up --build
#   Production  : docker compose --profile prod up --build -d
#   Stop        : docker compose down
#   Logs        : docker compose logs -f backend

services:
  # ===========================================
  # FastAPI Backend
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmc_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - PYTHONPATH=/app
    volumes:
      # Persist drug vector DB and user data across restarts
      - ./backend/app/data:/app/app/data
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - cmc_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ===========================================
  # React Frontend (Vite build → nginx)
  # ===========================================
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api/v1"
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-890597975309-3n3148aql203qjepgp0ife5hsig63465.apps.googleusercontent.com}"
    container_name: cmc_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - cmc_net
    depends_on:
      backend:
        condition: service_healthy

  # ===========================================
  # Nginx Reverse Proxy (optional, for single-port access)
  # ===========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: cmc_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cmc_net
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    profiles:
      - prod

  # ===========================================
  # MQTT Broker (for IoT vitals - optional)
  # ===========================================
  mqtt:
    image: eclipse-mosquitto:2
    container_name: cmc_mqtt
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mqtt/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_logs:/mosquitto/log
    networks:
      - cmc_net
    profiles:
      - iot

volumes:
  backend_logs:
  mqtt_data:
  mqtt_logs:

networks:
  cmc_net:
    driver: bridge
